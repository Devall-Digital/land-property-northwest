<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-hidden="true">
	<defs>
		<linearGradient id="lpnw-logo-tile" x1="60" y1="8" x2="60" y2="120" gradientUnits="userSpaceOnUse">
			<stop stop-color="#243A5E"/>
			<stop offset="0.45" stop-color="#1B2A4A"/>
			<stop offset="1" stop-color="#141E36"/>
		</linearGradient>
		<linearGradient id="lpnw-logo-gold" x1="60" y1="87" x2="60" y2="98" gradientUnits="userSpaceOnUse">
			<stop stop-color="#F5C04A"/>
			<stop offset="0.55" stop-color="#E8A317"/>
			<stop offset="1" stop-color="#C78F0F"/>
		</linearGradient>
		<linearGradient id="lpnw-logo-sheen" x1="60" y1="14" x2="60" y2="48" gradientUnits="userSpaceOnUse">
			<stop stop-color="#FFFFFF" stop-opacity="0.12"/>
			<stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
		</linearGradient>
	</defs>
	<rect width="120" height="120" rx="28" ry="28" fill="url(#lpnw-logo-tile)"/>
	<ellipse cx="60" cy="36" rx="42" ry="20" fill="url(#lpnw-logo-sheen)"/>
	<rect x="21" y="79" width="78" height="8" rx="4" fill="#000000" opacity="0.1"/>
	<!-- Right: rear plane (lighter) -->
	<path fill="#E8EDF5" d="M82 86V49h19v7h-8v30H82z"/>
	<rect x="88" y="62" width="14" height="2" rx="0.5" fill="#2D4470" opacity="0.45"/>
	<!-- Left: separation shade before centre tower -->
	<rect x="47" y="50" width="3.5" height="36" fill="#2D4470" opacity="0.38"/>
	<!-- Left tower: crenellated crown -->
	<path fill="#F7F8FA" d="M26 86V56h2v-4h3.5v-4h3v-4h11v4h3v4h3.5v4h2v30H26z"/>
	<!-- Centre hero tower -->
	<path fill="#F7F8FA" d="M51 86V41L62 28l11 13v45H51z"/>
	<!-- Amber beacon + spire -->
	<rect x="60.5" y="22" width="3" height="8" rx="1" fill="#F5C04A"/>
	<circle cx="62" cy="21" r="2" fill="#FFFFFF" opacity="0.95"/>
	<!-- Right: front white volume (stepped) -->
	<path fill="#F7F8FA" d="M74 86V55h22v9h5v22H74z"/>
	<!-- Centre tower windows: 3x2 grid, inside silhouette (x 51–73 above y 41) -->
	<g fill="#1B2A4A">
		<rect x="54.5" y="58" width="5" height="4.5" rx="0.6"/>
		<rect x="54.5" y="66.5" width="5" height="4.5" rx="0.6"/>
		<rect x="60.5" y="58" width="5" height="4.5" rx="0.6"/>
		<rect x="60.5" y="66.5" width="5" height="4.5" rx="0.6"/>
		<rect x="66.5" y="58" width="5" height="4.5" rx="0.6"/>
		<rect x="66.5" y="66.5" width="5" height="4.5" rx="0.6"/>
	</g>
	<rect x="23" y="84" width="74" height="1" rx="0.5" fill="#F7F8FA" opacity="0.2"/>
	<rect x="14" y="88" width="92" height="9" rx="4.5" fill="url(#lpnw-logo-gold)"/>
	<rect x="17" y="89" width="86" height="1.25" rx="0.5" fill="#FFFFFF" opacity="0.2"/>
</svg>
